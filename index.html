<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
}
#map{
    height:100%;
}
.info{
    position:absolute;
    top:10px;
    left:10px;
    z-index:1000;
    background:white;
    padding:10px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,.3);
    max-width:300px;
    font-family:Arial,sans-serif;
}
button{
    padding:10px 15px;
    background:#007bff;
    color:#fff;
    border:none;
    border-radius:5px;
}
</style>

</head>
<body>

<div class="info">
<button onclick="getLocation()">Refresh Location</button>
<div id="status">Getting your location...</div>
</div>

<div id="map"></div>

<script>

const map=L.map('map').setView([20.5937,78.9629],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

let marker;
let circle;
let retry=false;

function getLocation(){

document.getElementById("status").innerHTML="Finding GPS location...";

navigator.geolocation.getCurrentPosition(

success,

function(error){

if(error.code===3 && !retry){
retry=true;
document.getElementById("status").innerHTML="Retrying...";
setTimeout(getLocation,2000);
return;
}

let msg="";

switch(error.code){

case 1:
msg="Permission denied.";
break;

case 2:
msg="Location unavailable.";
break;

case 3:
msg="GPS timeout. Move outdoors and try again.";
break;

default:
msg=error.message;

}

document.getElementById("status").innerHTML=msg;

},

{

enableHighAccuracy:true,
timeout:30000,
maximumAge:0

}

);

}

function success(position){

retry=false;

const lat=position.coords.latitude;
const lon=position.coords.longitude;
const accuracy=position.coords.accuracy;

if(marker) map.removeLayer(marker);
if(circle) map.removeLayer(circle);

marker=L.marker([lat,lon]).addTo(map);

circle=L.circle([lat,lon],{
radius:accuracy
}).addTo(map);

map.setView([lat,lon],18);

marker.bindPopup("Current Location").openPopup();

document.getElementById("status").innerHTML=
`
<b>Latitude:</b> ${lat}<br>
<b>Longitude:</b> ${lon}<br>
<b>Accuracy:</b> ${accuracy.toFixed(1)} meters<br><br>

<a target="_blank"
href="https://www.google.com/maps?q=${lat},${lon}">
Open in Google Maps
</a>
`;

}

// Automatically request location when page loads
window.onload=getLocation;

</script>

</body>
</html>
